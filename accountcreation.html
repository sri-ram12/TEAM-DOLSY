<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account - Dolsy Music App</title>
    <link rel="stylesheet" href="accounstyle.css">
</head>
<body>
    <div class="container">
        <div class="register-box">
            <h2>Create an Account</h2>
            <form id="registerForm" action="http://172.16.10.70:8080/myapp/RegisterServlet" method="post" onsubmit="return  validateForm()">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="userid">Email</label>
                    <input type="email" id="userid" name="userid" required>
                </div>
                <div class="input-group"> 
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="input-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" name="confirm" required>
                </div>
                <button type="submit">Create Account</button>
                <div class="error-message" id="errorMessage"></div>
            </form>
            <div class="links">
                <a href="loginpage.html">Already have an account? Login</a>
            </div>
        </div>
    </div>

    <script src="javascript1.js"></script>
</body>
</html>
