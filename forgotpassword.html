<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Dolsy Music</title>
    <link rel="stylesheet" href="forgotstyle.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>Forgot Password</h1>
            <p>Please enter your email to reset your password.</p>

            <form id="forgot-password-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="submit-btn">Submit</button>
            </form>

            <div id="recovery-message" style="display: none;">
                <p>An OTP has been sent to your email.</p>
            </div>

            <p class="back-link"><a href="loginpage.html">Back to Login</a></p>
        </div>
    </div>

    <script>
        document.getElementById("forgot-password-form").addEventListener("submit", function(event) {
            event.preventDefault();
            const email = document.getElementById("email").value;
            
            if (email) {
                // Send email to server to request OTP
                fetch('/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById("recovery-message").style.display = "block";
                    } else {
                        alert('Failed to send OTP. Please try again.');
                    }
                })
                .catch(() => alert('An error occurred. Please try again.'));
            }
        });
    </script>
</body>
</html>
